services:
  airplex:
    labels:
      - 'traefik.enable=true'
      # DOMAIN must be set in the environment (e.g. DOMAIN=airplex.example.com) — Docker Compose does not support bash parameter expansion like ${APP_URL#https://}
      - 'traefik.http.routers.airplex.rule=Host(`${DOMAIN}`)'
      - 'traefik.http.routers.airplex.entrypoints=websecure'
      - 'traefik.http.routers.airplex.tls.certresolver=letsencrypt'
      - 'traefik.http.services.airplex.loadbalancer.server.port=3000'
    networks:
      - jarch-public
    ports: []

networks:
  jarch-public:
    external: true
